<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realphone by Telcel - Gestor de Tickets</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header class="app-header">
        <div class="logo">
            <i class="fa-solid fa-mobile-screen"></i>
            <div>
                <h1>Realphone</h1>
                <span class="subtitle">by Telcel</span>
            </div>
        </div>
        <div class="header-actions">
            <nav class="tabs-nav">
                <button class="tab-btn active" data-tab="tab-facturas"><i class="fa-solid fa-file-invoice-dollar"></i> Facturas</button>
                <button class="tab-btn" data-tab="tab-reparaciones"><i class="fa-solid fa-screwdriver-wrench"></i> Reparaciones</button>
            </nav>
        </div>
    </header>

    <main class="container">
        
        <!-- PESTAÑA FACTURAS -->
        <div id="tab-facturas" class="tab-content active">
            <!-- Dashboard Stats Facturas -->
            <section class="dashboard" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">
                <div class="stat-card">
                    <i class="fa-solid fa-check-circle done-icon"></i>
                    <div class="stat-info">
                        <h3>Realizadas</h3>
                        <p id="countDoneFacturas">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-xmark-circle cancelled-icon"></i>
                    <div class="stat-info">
                        <h3>Canceladas</h3>
                        <p id="countCancelledFacturas">0</p>
                    </div>
                </div>
            </section>

            <div class="grid-layout">
                <section class="form-section">
                    <h2><i class="fa-solid fa-file-invoice-dollar"></i> Nueva Factura Telcel</h2>
                    <form id="ticketFormFactura">
                        <div class="form-group">
                            <label for="clientNameFactura">Nombre del Cliente</label>
                            <input type="text" id="clientNameFactura" required placeholder="Nombre completo">
                        </div>
                        <div class="form-group">
                            <label for="clientPhone">Número de teléfono</label>
                            <input type="tel" id="clientPhone" required placeholder="Ej: 555 123 4567">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="tiendaFactura">Tienda</label>
                                <select id="tiendaFactura" required>
                                    <option value="">Seleccione una tienda</option>
                                    <option value="Matriz">Matriz</option>
                                    <option value="Sunny">Sunny</option>
                                    <option value="Hospital">Hospital</option>
                                    <option value="David">David</option>
                                    <option value="Portal">Portal</option>
                                    <option value="Coppel">Coppel</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="atendioFactura">Atendió</label>
                                <select id="atendioFactura" required>
                                    <option value="">Seleccione personal</option>
                                    <option value="Ángel">Ángel</option>
                                    <option value="Karen">Karen</option>
                                    <option value="Yatziri">Yatziri</option>
                                    <option value="Nicolás">Nicolás</option>
                                    <option value="Eduardo">Eduardo</option>
                                    <option value="Fernanda">Fernanda</option>
                                    <option value="Yamileth">Yamileth</option>
                                    <option value="Saúl">Saúl</option>
                                    <option value="Mayra">Mayra</option>
                                    <option value="Adrián">Adrián</option>
                                    <option value="Joshua">Joshua</option>
                                    <option value="Néstor">Néstor</option>
                                </select>
                            </div>
                        </div>

                        <div class="cobro-section">
                            <h3 class="section-title"><i class="fa-solid fa-money-bill-wave"></i> Apartado para el Cobro</h3>
                            <div class="form-group">
                                <label for="costTotalFactura">Costo Total ($)</label>
                                <input type="number" step="0.01" min="0" id="costTotalFactura" required placeholder="0.00">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-full">Crear Ticket de Factura</button>
                    </form>
                </section>

                <section class="tickets-section">
                    <div class="tickets-header">
                        <h2><i class="fa-solid fa-list"></i> Registro de Facturas</h2>
                        <div style="display:flex; gap: 1rem; align-items: center;">
                            <button class="btn btn-outline-danger" id="btnDeleteOldFacturas" title="Eliminar las de hace más de 1 mes" style="padding: 0.5rem 1rem; font-size:0.85rem;">
                                <i class="fa-solid fa-trash-clock"></i> Limpiar +1 mes
                            </button>
                        </div>
                    </div>
                    <div class="tickets-container" id="ticketsContainerFacturas"></div>
                </section>
            </div>
        </div>

        <!-- PESTAÑA REPARACIONES -->
        <div id="tab-reparaciones" class="tab-content" style="display: none;">
            <!-- Dashboard Stats Reparaciones -->
            <section class="dashboard">
                <div class="stat-card">
                    <i class="fa-solid fa-clock pending-icon"></i>
                    <div class="stat-info">
                        <h3>Pendientes</h3>
                        <p id="countPendingReparaciones">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-check-circle done-icon"></i>
                    <div class="stat-info">
                        <h3>Realizadas</h3>
                        <p id="countDoneReparaciones">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fa-solid fa-xmark-circle cancelled-icon"></i>
                    <div class="stat-info">
                        <h3>Canceladas</h3>
                        <p id="countCancelledReparaciones">0</p>
                    </div>
                </div>
            </section>

            <div class="grid-layout">
                <section class="form-section">
                    <h2><i class="fa-solid fa-screwdriver-wrench"></i> Nueva Reparación</h2>
                    <form id="ticketFormReparacion">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="clientNameReparacion">Nombre del Cliente</label>
                                <input type="text" id="clientNameReparacion" required placeholder="Nombre completo">
                            </div>
                            <div class="form-group">
                                <label for="deviceModel">Modelo del equipo</label>
                                <input type="text" id="deviceModel" required placeholder="Ej: iPhone 13, Moto G50...">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="repairType">Tipo de reparación</label>
                            <input type="text" id="repairType" required placeholder="Ej: Cambio de pantalla, Revisión de sistema...">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="tiendaReparacion">Tienda</label>
                                <select id="tiendaReparacion" required>
                                    <option value="">Seleccione una tienda</option>
                                    <option value="Matriz">Matriz</option>
                                    <option value="Sunny">Sunny</option>
                                    <option value="Hospital">Hospital</option>
                                    <option value="David">David</option>
                                    <option value="Portal">Portal</option>
                                    <option value="Coppel">Coppel</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="atendioReparacion">Atendió</label>
                                <select id="atendioReparacion" required>
                                    <option value="">Seleccione personal</option>
                                    <option value="Ángel">Ángel</option>
                                    <option value="Karen">Karen</option>
                                    <option value="Yatziri">Yatziri</option>
                                    <option value="Nicolás">Nicolás</option>
                                    <option value="Eduardo">Eduardo</option>
                                    <option value="Fernanda">Fernanda</option>
                                    <option value="Yamileth">Yamileth</option>
                                    <option value="Saúl">Saúl</option>
                                    <option value="Mayra">Mayra</option>
                                    <option value="Adrián">Adrián</option>
                                    <option value="Joshua">Joshua</option>
                                    <option value="Néstor">Néstor</option>
                                </select>
                            </div>
                        </div>

                        <div class="cobro-section">
                            <h3 class="section-title"><i class="fa-solid fa-money-bill-wave"></i> Apartado para el Cobro</h3>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="costTotalReparacion">Costo Total ($)</label>
                                    <input type="number" step="0.01" min="0" id="costTotalReparacion" required placeholder="0.00">
                                </div>
                                <div class="form-group">
                                    <label for="costAdvanceReparacion">Anticipo ($)</label>
                                    <input type="number" step="0.01" min="0" id="costAdvanceReparacion" placeholder="0.00">
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-full">Crear Ticket de Reparación</button>
                    </form>
                </section>

                <section class="tickets-section">
                    <div class="tickets-header">
                        <h2><i class="fa-solid fa-list"></i> Registro de Reparaciones</h2>
                        <div class="filter-group">
                            <select id="filterStatusReparaciones">
                                <option value="Todos">Todos</option>
                                <option value="Pendiente">Pendientes</option>
                                <option value="Realizado">Realizadas</option>
                                <option value="Cancelado">Canceladas</option>
                            </select>
                        </div>
                    </div>
                    <div class="tickets-container" id="ticketsContainerReparaciones"></div>
                    <button class="btn btn-outline btn-clear-all" id="btnClearCompletedReparaciones" style="width:100%; margin-top: 1rem;">Limpiar Realizadas/Canceladas</button>
                </section>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
